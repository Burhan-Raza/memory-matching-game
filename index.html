<!DOCTYPE html>
<html>
<head>
<title>Memory Matching Game</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>
<body>

<nav class="navbar">
  <h1>Memory Matching Game</h1>
</nav>



<div class="container">
  <p id="turn">Player 1 Turn</p>
  <p class="scores">Player 1 Score: <span id="p1">0</span> | Player 2 Score: <span id="p2">0</span></p>
  <button id="resetBtn" class="reset-btn">Reset Game</button>
  
  <div id="board">
    <div class="card" data-value="1">?</div>
    <div class="card" data-value="1">?</div>
    
    <div class="card" data-value="2">?</div>
    <div class="card" data-value="2">?</div>
    
    <div class="card" data-value="3">?</div>
    <div class="card" data-value="3">?</div>
    
    <div class="card" data-value="4">?</div>
    <div class="card" data-value="4">?</div>
    
    <div class="card" data-value="5">?</div>
    <div class="card" data-value="5">?</div>
    
    <div class="card" data-value="6">?</div>
    <div class="card" data-value="6">?</div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
